<!-- Correctif V54 — Synchro Supabase + Ambassadeurs
À coller dans index.html juste AVANT la balise </body>.
Objectifs :
- supprimer le polling Supabase toutes les 10 secondes ;
- conserver une synchro au chargement, au changement d’onglet et au retour sur la page ;
- préserver les filtres de l’onglet Ambassadeurs ;
- charger tous les étudiants de public.etudiants par pagination Supabase.
-->
<script>
(function(){
  'use strict';

  const EDH_V54 = {
    lastManualRefreshAt: 0,
    lastStudentsRefreshAt: 0,
    studentsRefreshInProgress: false,
    tabRefreshInProgress: false,
    lastKnownStudentCount: 0
  };

  const STUDENT_FILTER_IDS = {
    search: 'student-lycee-search',
    school: 'student-school-filter',
    origin: 'student-origin-filter',
    city: 'student-city-filter',
    sort: 'student-sort'
  };

  const studentFiltersV54 = {
    search: '',
    school: '',
    origin: '',
    city: '',
    sort: 'lastname'
  };

  function byId(id){ return document.getElementById(id); }

  function normalizeTextV54(value){
    return String(value ?? '')
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .toLowerCase()
      .replace(/\s+/g, ' ')
      .trim();
  }

  function escapeHtmlV54(value){
    if(typeof escapeHtml === 'function') return escapeHtml(value);
    return String(value ?? '').replace(/[&<>"']/g, function(char){
      return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;' })[char];
    });
  }

  function normalizeSchoolV54(value){
    const raw = String(value ?? '').trim();
    if(!raw) return '';
    if(typeof normalizeSchoolName === 'function'){
      const normalized = normalizeSchoolName(raw);
      if(normalized) return normalized;
    }
    const n = normalizeTextV54(raw);
    if(n.includes('efap')) return 'EFAP';
    if(n.includes('icart')) return 'ICART';
    if(n.includes('cread')) return 'CREAD';
    if(n.includes('brassart')) return 'BRASSART';
    return raw.toUpperCase();
  }

  function normalizeStudentV54(student){
    const firstName = student?.firstName || student?.first_name || student?.prenom || '';
    const lastName = student?.lastName || student?.last_name || student?.nom || '';
    const school = normalizeSchoolV54(student?.school || student?.ecole || '');
    return {
      ...student,
      id: String(student?.id || student?.app_id || student?.supabase_id || ('STD_' + Date.now() + '_' + Math.random().toString(16).slice(2))),
      supabase_id: student?.supabase_id || student?.id || null,
      firstName,
      lastName,
      email: student?.email || student?.mail || '',
      phone: student?.phone || student?.telephone || student?.tel || '',
      school,
      campus: student?.campus || student?.ville_residence || student?.region || '',
      lycee: student?.lycee || student?.lycee_origine || '',
      lyceeVille: student?.lyceeVille || student?.lycee_ville || student?.ville_lycee || '',
      promo: student?.promo || '',
      notes: student?.notes || ''
    };
  }

  function captureStudentFiltersV54(){
    const search = byId(STUDENT_FILTER_IDS.search);
    const school = byId(STUDENT_FILTER_IDS.school);
    const origin = byId(STUDENT_FILTER_IDS.origin);
    const city = byId(STUDENT_FILTER_IDS.city);
    const sort = byId(STUDENT_FILTER_IDS.sort);

    if(search) studentFiltersV54.search = search.value || '';
    if(school) studentFiltersV54.school = school.value || '';
    if(origin) studentFiltersV54.origin = origin.value || '';
    if(city) studentFiltersV54.city = city.value || '';
    if(sort) studentFiltersV54.sort = sort.value || 'lastname';

    return { ...studentFiltersV54 };
  }

  function optionExistsV54(select, value){
    if(!select) return false;
    if(!value) return true;
    return Array.from(select.options || []).some(option => option.value === value);
  }

  function restoreStudentFiltersV54(saved = studentFiltersV54){
    const search = byId(STUDENT_FILTER_IDS.search);
    const school = byId(STUDENT_FILTER_IDS.school);
    const origin = byId(STUDENT_FILTER_IDS.origin);
    const city = byId(STUDENT_FILTER_IDS.city);
    const sort = byId(STUDENT_FILTER_IDS.sort);

    if(search) search.value = saved.search || '';
    if(school && optionExistsV54(school, saved.school || '')) school.value = saved.school || '';
    if(origin && optionExistsV54(origin, saved.origin || '')) origin.value = saved.origin || '';
    if(city && optionExistsV54(city, saved.city || '')) city.value = saved.city || '';
    if(sort && optionExistsV54(sort, saved.sort || 'lastname')) sort.value = saved.sort || 'lastname';
  }

  function installStudentFilterListenersV54(){
    document.addEventListener('input', function(event){
      if(event.target && Object.values(STUDENT_FILTER_IDS).includes(event.target.id)) captureStudentFiltersV54();
    }, true);

    document.addEventListener('change', function(event){
      if(event.target && Object.values(STUDENT_FILTER_IDS).includes(event.target.id)) captureStudentFiltersV54();
    }, true);
  }

  function visibleStudentsBaseV54(){
    let base = [];
    try {
      base = typeof getVisibleStudents === 'function'
        ? getVisibleStudents()
        : (Array.isArray(STUDENTS) ? STUDENTS : []);
    } catch(error){
      base = Array.isArray(STUDENTS) ? STUDENTS : [];
      console.warn('[V54] getVisibleStudents indisponible, fallback STUDENTS.', error);
    }
    return base.map(normalizeStudentV54);
  }

  function filteredStudentsV54(){
    const q = normalizeTextV54(byId(STUDENT_FILTER_IDS.search)?.value || studentFiltersV54.search || '');
    const selectedSchool = normalizeSchoolV54(byId(STUDENT_FILTER_IDS.school)?.value || studentFiltersV54.school || '');
    const selectedOrigin = byId(STUDENT_FILTER_IDS.origin)?.value || studentFiltersV54.origin || '';
    const selectedCity = byId(STUDENT_FILTER_IDS.city)?.value || studentFiltersV54.city || '';
    const sort = byId(STUDENT_FILTER_IDS.sort)?.value || studentFiltersV54.sort || 'lastname';

    const selectedOriginNorm = normalizeTextV54(selectedOrigin);
    const selectedCityNorm = normalizeTextV54(selectedCity);

    const data = visibleStudentsBaseV54().filter(function(student){
      const school = normalizeSchoolV54(student.school);
      const schoolOk = !selectedSchool || school === selectedSchool;
      const originOk = !selectedOriginNorm || normalizeTextV54(student.lycee) === selectedOriginNorm;
      const cityOk = !selectedCityNorm || normalizeTextV54(student.lyceeVille) === selectedCityNorm;
      const haystack = normalizeTextV54([
        student.firstName,
        student.lastName,
        student.email,
        student.phone,
        student.school,
        student.campus,
        student.lycee,
        student.lyceeVille,
        student.promo,
        student.notes
      ].join(' '));
      const qOk = !q || haystack.includes(q);
      return schoolOk && originOk && cityOk && qOk;
    });

    data.sort(function(a,b){
      if(sort === 'school') return (a.school || '').localeCompare(b.school || '') || (a.lastName || '').localeCompare(b.lastName || '');
      if(sort === 'lycee') return (a.lycee || '').localeCompare(b.lycee || '') || (a.lastName || '').localeCompare(b.lastName || '');
      return (a.lastName || '').localeCompare(b.lastName || '') || (a.firstName || '').localeCompare(b.firstName || '');
    });

    return data;
  }

  function populateStudentDropdownFiltersV54(){
    const saved = captureStudentFiltersV54();
    const lyceeSelect = byId(STUDENT_FILTER_IDS.origin);
    const citySelect = byId(STUDENT_FILTER_IDS.city);
    if(!lyceeSelect || !citySelect) return;

    const students = visibleStudentsBaseV54();
    const selectedSchool = normalizeSchoolV54(byId(STUDENT_FILTER_IDS.school)?.value || saved.school || '');
    const studentsForFilters = selectedSchool
      ? students.filter(student => normalizeSchoolV54(student.school) === selectedSchool)
      : students;

    const lycees = [...new Set(studentsForFilters.map(student => String(student.lycee || '').trim()).filter(Boolean))]
      .sort((a,b) => a.localeCompare(b));
    const cities = [...new Set(studentsForFilters.map(student => String(student.lyceeVille || '').trim()).filter(Boolean))]
      .sort((a,b) => a.localeCompare(b));

    lyceeSelect.innerHTML = '<option value="">Tous les lycées</option>' + lycees.map(value => `<option value="${escapeHtmlV54(value)}">${escapeHtmlV54(value)}</option>`).join('');
    citySelect.innerHTML = '<option value="">Toutes les villes</option>' + cities.map(value => `<option value="${escapeHtmlV54(value)}">${escapeHtmlV54(value)}</option>`).join('');

    restoreStudentFiltersV54(saved);
  }

  function renderStudentsPageV54(){
    const saved = captureStudentFiltersV54();
    const kpis = byId('students-kpis');
    const count = byId('students-count');
    const list = byId('students-list');
    if(!kpis || !count || !list){
      if(typeof EDH_V54.previousRenderStudentsPage === 'function') return EDH_V54.previousRenderStudentsPage();
      return;
    }

    populateStudentDropdownFiltersV54();
    restoreStudentFiltersV54(saved);

    const visible = visibleStudentsBaseV54();
    const data = filteredStudentsV54();
    const counts = {
      total: visible.length,
      EFAP: visible.filter(student => normalizeSchoolV54(student.school) === 'EFAP').length,
      ICART: visible.filter(student => normalizeSchoolV54(student.school) === 'ICART').length,
      CREAD: visible.filter(student => normalizeSchoolV54(student.school) === 'CREAD').length,
      BRASSART: visible.filter(student => normalizeSchoolV54(student.school) === 'BRASSART').length
    };

    kpis.innerHTML = `
      <div class="kpi-card"><div class="kpi-label">Total étudiants</div><div class="kpi-value">${counts.total}</div><div class="kpi-meta">Base visible</div></div>
      <div class="kpi-card"><div class="kpi-label">EFAP</div><div class="kpi-value" style="color:var(--efap)">${counts.EFAP}</div><div class="kpi-meta">Étudiants enregistrés</div></div>
      <div class="kpi-card"><div class="kpi-label">ICART</div><div class="kpi-value" style="color:var(--icart)">${counts.ICART}</div><div class="kpi-meta">Étudiants enregistrés</div></div>
      <div class="kpi-card"><div class="kpi-label">CREAD</div><div class="kpi-value" style="color:var(--cread)">${counts.CREAD}</div><div class="kpi-meta">Étudiants enregistrés</div></div>
      <div class="kpi-card"><div class="kpi-label">BRASSART</div><div class="kpi-value" style="color:var(--brassart)">${counts.BRASSART}</div><div class="kpi-meta">Étudiants enregistrés</div></div>
    `;

    count.textContent = `${data.length} résultat(s)`;

    list.innerHTML = data.length ? data.map(function(student){
      const id = escapeHtmlV54(student.id);
      const name = escapeHtmlV54(`${student.firstName || ''} ${student.lastName || ''}`.trim() || 'Étudiant sans nom');
      const email = escapeHtmlV54(student.email || 'Email non renseigné');
      const phone = student.phone ? ' · ' + escapeHtmlV54(student.phone) : '';
      const school = escapeHtmlV54(normalizeSchoolV54(student.school) || student.school || 'École non renseignée');
      const lycee = escapeHtmlV54(student.lycee || 'Lycée d’origine non renseigné');
      const lyceeVille = student.lyceeVille ? `<span class="tag-sm tag-prive">${escapeHtmlV54(student.lyceeVille)}</span>` : '';
      const campus = student.campus ? `<span class="tag-sm tag-efap">${escapeHtmlV54(student.campus)}</span>` : '';
      const notes = student.notes ? `<div style="font-size:12px;color:var(--text2);margin-top:10px;line-height:1.6">${escapeHtmlV54(student.notes)}</div>` : '';
      return `
        <div class="student-card">
          <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start">
            <div>
              <div class="student-name">${name}</div>
              <div class="student-meta">${email}${phone}</div>
            </div>
            <span class="student-pill">${school}</span>
          </div>
          <div class="student-tags" style="margin-top:8px">
            <span class="tag-sm tag-public">${lycee}</span>
            ${lyceeVille}
            ${campus}
          </div>
          ${notes}
          <div class="small-actions" style="margin-top:12px">
            <button class="btn btn-ghost" style="padding:4px 8px;font-size:11px" onclick="openStudentModal('${id}')">Modifier</button>
            <button class="btn btn-danger" style="padding:4px 8px;font-size:11px" onclick="deleteStudent('${id}')">Supprimer</button>
          </div>
        </div>
      `;
    }).join('') : '<div class="muted-box">Aucun étudiant trouvé avec ces critères.</div>';

    restoreStudentFiltersV54(saved);
  }

  function mapSupabaseStudentFallbackV54(row){
    if(typeof mapSupabaseStudentToApp === 'function') return normalizeStudentV54(mapSupabaseStudentToApp(row));
    return normalizeStudentV54(row);
  }

  async function fetchAllEtudiantsV54(){
    if(typeof supabaseClient === 'undefined' || !supabaseClient) return null;

    const columns = 'id,prenom,nom,ecole,ville_residence,lycee_origine,ville_lycee,app_id,first_name,last_name,email,phone,school,campus,lycee,lycee_ville,promo,notes,updated_at';
    const pageSize = 1000;
    const rows = [];

    for(let page = 0; page < 100; page++){
      const from = page * pageSize;
      const to = from + pageSize - 1;
      let response = await supabaseClient
        .from('etudiants')
        .select(columns)
        .order('id', { ascending: true })
        .range(from, to);

      if(response.error && page === 0){
        response = await supabaseClient
          .from('etudiants')
          .select('*')
          .order('id', { ascending: true })
          .range(from, to);
      }

      if(response.error) throw response.error;
      const data = Array.isArray(response.data) ? response.data : [];
      rows.push(...data);
      if(data.length < pageSize) break;
    }

    return rows;
  }

  async function refreshStudentsFromSupabaseV54(options = {}){
    const render = options.render !== false;
    if(EDH_V54.studentsRefreshInProgress) return false;
    if(typeof supabaseClient === 'undefined' || !supabaseClient) return false;

    EDH_V54.studentsRefreshInProgress = true;
    const saved = captureStudentFiltersV54();

    try {
      const rows = await fetchAllEtudiantsV54();
      if(!rows) return false;

      const mapped = rows
        .map(mapSupabaseStudentFallbackV54)
        .filter(student => student.firstName || student.lastName || student.email || student.school || student.lycee);

      if(Array.isArray(STUDENTS)){
        STUDENTS.splice(0, STUDENTS.length, ...mapped);
      } else {
        window.STUDENTS = mapped;
      }

      EDH_V54.lastKnownStudentCount = mapped.length;
      EDH_V54.lastStudentsRefreshAt = Date.now();

      try { if(typeof saveLocalData === 'function') saveLocalData(); } catch(error){ console.warn('[V54] Cache local étudiants non sauvegardé.', error); }

      if(render && byId('page-students')?.classList.contains('active')){
        restoreStudentFiltersV54(saved);
        renderStudentsPageV54();
      }

      return true;
    } catch(error){
      console.error('[V54] Erreur chargement complet des ambassadeurs depuis Supabase:', error);
      if(typeof showToast === 'function') showToast('Erreur chargement ambassadeurs Supabase : ' + (error?.message || String(error)), 'error');
      return false;
    } finally {
      EDH_V54.studentsRefreshInProgress = false;
      restoreStudentFiltersV54(saved);
    }
  }

  function stopPeriodicPollingV54(){
    try {
      if(typeof SUPABASE_PERIODIC_REFRESH_TIMER !== 'undefined' && SUPABASE_PERIODIC_REFRESH_TIMER){
        clearInterval(SUPABASE_PERIODIC_REFRESH_TIMER);
        SUPABASE_PERIODIC_REFRESH_TIMER = null;
      }
    } catch(error){
      console.warn('[V54] Impossible de stopper le polling Supabase.', error);
    }
  }

  function isPublicLeadModeV54(){
    return Boolean(document.body && document.body.classList.contains('public-lead-mode'));
  }

  async function syncOnTabChangeV54(pageName){
    if(EDH_V54.tabRefreshInProgress || isPublicLeadModeV54()) return;
    const now = Date.now();
    if(now - EDH_V54.lastManualRefreshAt < 15000) return;

    EDH_V54.tabRefreshInProgress = true;
    EDH_V54.lastManualRefreshAt = now;
    const saved = captureStudentFiltersV54();

    try {
      if(pageName === 'students' || byId('page-students')?.classList.contains('active')){
        await refreshStudentsFromSupabaseV54({ render: true, reason: 'tab-change' });
      } else if(typeof window.refreshFromSupabaseAndRender === 'function'){
        await window.refreshFromSupabaseAndRender(true, 'tab-change-v54');
      }
    } finally {
      restoreStudentFiltersV54(saved);
      EDH_V54.tabRefreshInProgress = false;
    }
  }

  function installFunctionOverridesV54(){
    try {
      EDH_V54.previousPopulateStudentDropdownFilters = typeof populateStudentDropdownFilters === 'function' ? populateStudentDropdownFilters : null;
      populateStudentDropdownFilters = populateStudentDropdownFiltersV54;
      window.populateStudentDropdownFilters = populateStudentDropdownFiltersV54;
    } catch(error){ console.warn('[V54] Override populateStudentDropdownFilters impossible.', error); }

    try {
      EDH_V54.previousFilteredStudents = typeof filteredStudents === 'function' ? filteredStudents : null;
      filteredStudents = filteredStudentsV54;
      window.filteredStudents = filteredStudentsV54;
    } catch(error){ console.warn('[V54] Override filteredStudents impossible.', error); }

    try {
      EDH_V54.previousRenderStudentsPage = typeof renderStudentsPage === 'function' ? renderStudentsPage : null;
      renderStudentsPage = renderStudentsPageV54;
      window.renderStudentsPage = renderStudentsPageV54;
    } catch(error){ console.warn('[V54] Override renderStudentsPage impossible.', error); }

    try {
      const previousRefresh = typeof refreshFromSupabaseAndRender === 'function' ? refreshFromSupabaseAndRender : null;
      if(previousRefresh){
        const refreshWrappedV54 = async function(silent = true, reason = 'manual', seasonOverride = null){
          // Sécurité : si un ancien timer 10 secondes existe encore, on ignore son appel.
          if(reason === 'polling') return false;
          const saved = captureStudentFiltersV54();
          const result = await previousRefresh.call(this, true, reason, seasonOverride);
          restoreStudentFiltersV54(saved);
          if(byId('page-students')?.classList.contains('active')){
            await refreshStudentsFromSupabaseV54({ render: true, reason: reason || 'refresh' });
          }
          return result;
        };
        refreshFromSupabaseAndRender = refreshWrappedV54;
        window.refreshFromSupabaseAndRender = refreshWrappedV54;
      }
    } catch(error){ console.warn('[V54] Override refreshFromSupabaseAndRender impossible.', error); }

    try {
      const previousSetup = typeof setupSupabaseRealtime === 'function' ? setupSupabaseRealtime : null;
      if(previousSetup){
        const setupWrappedV54 = function(){
          const result = previousSetup.apply(this, arguments);
          stopPeriodicPollingV54();
          setTimeout(stopPeriodicPollingV54, 250);
          setTimeout(stopPeriodicPollingV54, 1000);
          try { if(typeof setSupabaseStatus === 'function') setSupabaseStatus('ok', 'Supabase : connecté · sync sans polling 10s'); } catch(_) {}
          return result;
        };
        setupSupabaseRealtime = setupWrappedV54;
        window.setupSupabaseRealtime = setupWrappedV54;
      }
    } catch(error){ console.warn('[V54] Override setupSupabaseRealtime impossible.', error); }

    try {
      const previousShowPage = typeof showPage === 'function' ? showPage : null;
      if(previousShowPage){
        const showPageWrappedV54 = function(pageName){
          const result = previousShowPage.apply(this, arguments);
          setTimeout(function(){ syncOnTabChangeV54(pageName); }, 0);
          return result;
        };
        showPage = showPageWrappedV54;
        window.showPage = showPageWrappedV54;
      }
    } catch(error){ console.warn('[V54] Override showPage impossible.', error); }
  }

  function installFocusRefreshV54(){
    window.addEventListener('focus', function(){
      if(isPublicLeadModeV54()) return;
      const now = Date.now();
      if(now - EDH_V54.lastManualRefreshAt < 120000) return;
      syncOnTabChangeV54(byId('page-students')?.classList.contains('active') ? 'students' : 'focus');
    });
  }

  function installDebugToolsV54(){
    window.refreshStudentsFromSupabaseV54 = refreshStudentsFromSupabaseV54;
    window.edhDebugAmbassadeursV54 = function(){
      const visible = visibleStudentsBaseV54();
      const filtered = filteredStudentsV54();
      const bySchool = visible.reduce(function(acc, student){
        const school = normalizeSchoolV54(student.school) || 'Non renseigné';
        acc[school] = (acc[school] || 0) + 1;
        return acc;
      }, {});
      const result = {
        totalDansSTUDENTS: Array.isArray(STUDENTS) ? STUDENTS.length : 0,
        totalVisible: visible.length,
        totalFiltreActuel: filtered.length,
        filtres: captureStudentFiltersV54(),
        repartitionParEcole: bySchool,
        dernierChargementComplet: EDH_V54.lastStudentsRefreshAt ? new Date(EDH_V54.lastStudentsRefreshAt).toLocaleString('fr-FR') : 'Jamais'
      };
      console.table(result);
      console.table(bySchool);
      return result;
    };
  }

  installStudentFilterListenersV54();
  installFunctionOverridesV54();
  installFocusRefreshV54();
  installDebugToolsV54();

  // Stoppe immédiatement le polling déjà lancé par les anciennes versions.
  stopPeriodicPollingV54();
  setTimeout(stopPeriodicPollingV54, 250);
  setTimeout(stopPeriodicPollingV54, 1000);
  setTimeout(stopPeriodicPollingV54, 3000);

  // Si l’utilisateur est déjà sur Ambassadeurs, on force un chargement complet paginé.
  setTimeout(function(){
    captureStudentFiltersV54();
    if(byId('page-students')?.classList.contains('active')){
      refreshStudentsFromSupabaseV54({ render: true, reason: 'initial-students-page' });
    }
  }, 1200);

  console.info('[EDH V54] Correctif synchro/ambassadeurs chargé : polling 10s désactivé, filtres conservés, étudiants chargés par pagination.');
})();
</script>
